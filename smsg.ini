0!POMOCR12_1!Biały czołgi!Ulepszone czołgi, ma dużo HP, pancerz z effektom "Odbicie bólu". odporność k pulapke "signał", "strach". Może włączać pusty czołgi.
0!POMOCR12_0!White tanks!White tanks Have 3000 HP, armor with "pain reflecton", immune to signaltrap (false target trick) and immune to fear. Have possiblity reactivate any disabled tanks or miners. Instead of loot when dead drops bomb.
