0!POMOCR13_0!Rikoszet!Any enemy having Pain reflection can reflect special effect of your ammo to you. Use with attentiveness.
0!POMOCR14_2!Усилитель!Взятие усилителя увеличивает вашу скорость и вред на некоторое непродолжительное время. Каждый патрон немного отталкивает и сбивает противника, мало того он будет продолжать получать немаленький урон даже после выстрела. Рикошет от патрон также усиливается и патрон может расщепится сразу в 3 стороны от точки попадания. Наиболее вреден от рикошета клуб дыма. Эффект не накапливаемый в отличие от всех других бонусов. 
Бонус сочетается с любым оружием. 
