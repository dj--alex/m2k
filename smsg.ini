0!POMOCR6_0!Bonuses and effects! Blue - Minigun - Enhanced shotgun^ !Red - Damager -  Enhance speed, (movement and ammo), power of every weapon and adds enhanced rikoszet. Extremely unsafe. ^ Red+Blue -  Increase rikoszet effect. ^ All ammo adds wounds, they do more damage if target is moving. Wound Can be healed. ^ Magenta -  Slow -  Slow down you and even ammo.^ Green -  Fear -  Tanks just don't fight, You under fear lost control of your hero. ^ Cyan -  Freeze -  Paralyses target. ^ Light-green -  Aura of protect -  Protects and reduce 1/3 damage for all nearest tanks^ Light-green -  Aura of repair -  Fast repair all nearest tanks.^ Purple/Rose -  Pain reflection/ Rikoszet aura  -  Give Pain protection for all nearest tanks.Not protects from any damage.^ Orange -  Pain reflection  -  Returns some of ammo to sender even if ammo enhanced. Not protects from any damage.^ You cannot use pain reflection. ^ Yellow -  Protect -  Reduce damage and protect from special effects like Fear, control , etc.^ Control -  No color -  Allows control unit by you^  Transparent -  Invisiblity -  Allows using intems or moving. If target shoots invisible is broke. ^ Flashing -  Wound  -  Damage HP until it ends. When moves damage is increased.^ Color flash -  Curse  -  Reduce damage from main hero.  You cannot curse AI tanks.
0!POMOCR7_2!Основное оружие.!Обычный выстрел, Альтернативный режим (бывший лёд), Комбо режим когда обе кнопки зажаты одновременно, и Удерживание - режим когда зажата постоянно огонь. Список вооружения:^ ^ 1.Обычный пистолет и его модификации на +20 и +50 имеют обычный урон.^Альтернативный огонь - слабый ледяной выстрел.^Комбо нет.^Удерживание огня вызывает выстрел сразу 3 патронами с более длинным кулдауном.^ 2.Ошеломляющий пистолет сбивает с места противника, наносит значительно меньше урона (-100 к урону).^ Альт. огонь - нет^ Комбо урон - снятие всех эффектов с врага. Это ^ динственное оружие способное снять с врага защиту и отражение боли.Удерживание - нет.^ 3.Замораживающий пистолет +25 freeze effect -20 damage^ Альт. огонь - нет.^ Удерживание не наносит урона однако вокруг цели будет заморожена куча противников. Тратит значительно больше припасов ice.^ Комбо эффект замораживает все существующие танки и пушки на поле, замедляет даже патроны. но тратит при этом 300 ледяных выстрелов либо 1 paralyzator ammo.^ 4.Замедлитель. Замедляет одну цель нанеся обычный урон.^ Удерживание даёт массовый эффект с увеличенным расходом патрон. Этот патрон летит с более низкой скоростью. ^ Комбо нет.^ 5.Страх. Пугает нанося обычный урон.^ Удерживание даёт массовый эффект с увеличенным расходом патрон. 5% шанс что выбранная цель станет врагом для всех танков.^ Альт. огонь - Попытка перехвата контроля ИИ управляющими танками. Тратит усиленно лёд вместо обычных патрон. ^Любое ваше движение и выстрел будет копироватся захваченным танком.  ^ Для ученых такой выстрел обычно смертелен. ^ Комбо нет.^ 6.Разрушитель. Уничтожает и разьедает броню танка. Пораженные противники постоянно теряют жизнь даже после удара.^ Удерживание даёт массовый эффект с увеличенным расходом патрон. В 5% случаев Враг может разозлится и получить ускорение одновременно с этим эффектом. ^ Комбо - очередь из 6 разрывных пуль иногда разлетающаяся от цели в 4 разных стороны. Работает только при наличии пулеметных лент. ^ 7. Гранатомёт. Стреляет только одним единственным способом - доставляет врагам бомбы. ^Очень медленный, но достаточно эффективный. Бомба взрывается только если цель жива. Tратит бомбы вместо патрон.
