0!POMOCR5_2!Тактика!В первую очередь нужно по прибытию найти место где лежат припасы еды и оружия таких комнат много.  ^ База довольно неплохо защищена, но порталы противника уничтожить невозможно. 
Первое время будет относительно безопасно. В большинстве комнат есть защитные ловушки на которых танки взрываются, либо наносят им какой либо вред.
а вы спокойно проходите их. ^Любая красная ловушка на полу - ваш друг и союзник.^ Расстреливать танк лучше всего когда он не может уверутся.^ Взорвать его сложнее, т.к. пока вы ставите бомбу танк может попросту выстрелить в нее.^^В игре существуют бонусы которые могут улучшать или ухудшать ваши характеристики.^ Одеваемые предметы и оружие не теряются после смерти. ^ Важно чем больше солнечных панелей тем надёжней работают ловушки и тем лучше заряжают и ремонтируют шприцы. ^Баррикады могут помощь защитить базу от вторжения.^ Доставка бочек с топливом. Их нужно просто перетолкать или перенести на корабль (белая стартовая комната) В любой незанятый люк.^ Для доставки учёных хватит 4 бочек. Одна стоит заранее.^ Учёных желательно спасти хотя бы 6 человек.^ Ученые могут открывать двери, а также ремонтиовать некоторые типы вещей вроде оград.^ Берегите их от мин и бомб.  Ловушки на них не действуют как и на вас.
