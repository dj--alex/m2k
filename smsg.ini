0!POMOCR7_0!Weapons!Any weapon now you can select by pressing key 1...5.^ Remember if you die, all inventory "in hands" except your selected weapon be lost.^ ^ You now can use weapons by 4 methods, not all weapon have all 4. but at least 2-3 . ^ Alt fire is ice shot (caps lock), Combo is use ammo and ice firing both . Long fire is pressing ammo key long.^  1.Enforcer. First weapon (undroppable)and  ^ ods +20,+50 do normal damage ^ Alt Fire - Low power ice shot, can freeze items.^ Combo - No^ Longfire - Shot 3 bullets, but have more cooldown.^ 2.Shock gun - Stuns enemy, your damage seriously decreased. (-100 to damage) ^ Alt fire - no^ Combo fire - Dispels any effects positive or negative on enemy, even Pain reflection or Protect.^ 3.Freeze gun - +25 freeze and -20 damage^ Alt fire - no
Longfire - Does 0 damage but freezes all enemies near target. Require more ice. ^ Combo - Freezes all living creatures on map, and bullets (!). Require 300 ice or paralyzator ammo.^ 4.Slow gun. Do normal damage and slows one target.^ Alt fire - no ^Long fire - Slows all enemies near target. Require more ammo. Increased cooldown ^ Combo - no ^ 5.Fear gun. Do normal damage and fears one target. (except white tanks or anomalies)^ Long fire - Fears all enemies near target. Require more ammo. 5% chance to selected tank becomes enemy to others. Increased  cooldown ^ Alt Fire - Trying take control electronics on tanks. Require ice instead ammo. All your moves and fire be copied controlled tank. ^ Combo - No. ^ 6.Disruptor. Destroys armor tanks, have long effect after shot. Do normal damage.
Long fire - Corrupt all enemies near target. Require more ammo. 5% chance to selected tank becomes red. (rage, speedup) . Increased cooldown ^ Combo - Shots 7 shards, after strikes they can produce new 4 shards. Require minigun ammo.^ 7.Grenade launcher. Does as named. Delivery bombs to enemies. Bomb explosion creates only when strikes with any living creature.
0!POMOCR8_2!Кооп, Хотсит, Мультиплеер!Кооперативная игра, Мультиплеер в режиме хотсит.^ Второй и третий игрок могут теперь вступить в игру на правах дополнительного персонажа. Нажатие левого стика выбирает наугад любого ученого таким образом вы играете на стороне ГГ, нажатие правого выбирает наугад любого врага, а вы играете против ГГ. ^Персонажи сохраняют свои особенности. над управляемым персонажем появляется маркер. ^ Дополнительные игроки могут использовать только джойстики или доп. цифровой блок клавиатуры. Поддерживаются только PS3 и Xbox360 джойстики. ^Все игроки должны находится на 1-м экране. Управление игроком за экраном возможно, но вы не будете его видеть пока не войдете в зону видимости 1-го игрока. ^Первый джойстик по умолчанию принадлежит основному игроку, однако нажав комбинацию select + pause можно его передать второму игроку, а первый сможет продолжить играть с клавиатуры. Второй игрок не может обратно перехватить управление первым игроком таким же образом. Пока отменяется только перезапуском игры. ^ После смерти выбранного персонажа незамедлительно выбирается любой другой персонаж. (из видимых на экране). Если таких нет можно нажать кнопку выбора повторно когда будут. Левый или правый стик - неважно, вы не сможете сменить сторону. ^Если главный игрок спровоцировал исчезновение противника с экрана (телепортировался например), можно нажав левый и правый курки на джойстике выбрать другой танк. (выбор делается случайно)
0!POMOCR8_1!COOP, Multiplayer!Maksimalna liczba graczy 3. Dla gry można używać KB+KB, KB+PAD, PAD+PAD. Aby wybrać grę za wróga czy naukowca - na pad nacisnij ., poza tym 7 czy 9. (lewy czy prawy drążek, nacisnij). Wszystkie graczy musi byc na jednem ekrane. Nie ma split-screen. Pad1 może byc używany jak pad 2 - nacisnia select+pause (opcja nie może być zresetowana). 
0!POMOCR8_0!COOP, Hotseat, Multiplayer!Maximum 3 players.^ You can use combinations Keyboars + Keyboard, or controllers ^ First keyboard always is main player but by default duplicated in first controller.^ All players must play on one screen. No network or split-screen mode.^ All creatures save their possiblities. ^ Scientists can repair items or go with main player. They cannot do damage.
If player 2 die, automatically reselect any another tanks near location.^ If you dont like selected tank  just remove it off from screen pressing left and right sticks. ^ To start 2nd player you can use numpad keys and use . and 7 or 9 to select side - scientist or enemy.^ Or just take 2nd controller.^ If you press on controller 1 PL "select" and "pause" keys controller reassigned to Player 2 . (some options like menu is disabled for PL2). (2 automatically reassigns to 3). Game requires restart to reset this option.^ Left sticks pressing select tank, Right - scientist side. Side changing not allowed. Requires Map restart.
0!POMOCR9_2!Тактика игры за врага:!Начать игру можно щелчком на левом стике. (либо нажав . на цифровом блоке)^ Если вы потеряли свой танк из поля зрения - нажмите сразу оба курка - - таким образом выберется другой танк. (7 за танк, 9 , за ученого) ^ Во первых старайтесь брать бонусы - усиление или защиту.^ Если вы видите умеренно зеленого цвета танк - то он лечит полность вашу жизнь если ^ аходится рядом с ним в течении хотя бы 5 секунд. ^ Также получить отражение боли можно находясь рядом с оранжевым танком. чем дольше находитесь - тем дольше будет длится эффект.^ Замечу отражение боли не снижает урон от главного героя. Оно лишь даёт шанс возврата пули в отправителя. Причем если это было специальное оружие, то и эффект тоже будет специальный.^ Батарейки которые герой может использовать для дроидов вы можете использовать для мгновенного лечения себя. ^ Если выбранный танк погибнет, то герой получит очки, а вам передастся управление любым другим танком из тех что видны на экране.(либо нажав . на цифровом блоке) ^ Некоторые танки могут по своей воле копировать некоторые ваши действия. Впрочем если вы не будете действовать они мгновенно про вас забудут. 
