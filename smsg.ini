0!POMOCR5_0!Tactics!Your main target is save scientists, and take at least 6 fuel canisters to start shit (white room in start)^ Scientists after unfreezing randomly walks but can use health stations, doors, medkits, teleports, remember it. ^Your enemies is not your main target.^Your Base have protect traps, but enemies have indestructable portals.^You can place traps or bombs or barricades to avoid visits of enemy. ^First when you arrives you must take weapons, medkits, force field or tank.^^With empty hands surviving is harder. ^In space station have airlocks section with computer where you can order equipment for score (slow) ^Section with 6 teleporters is main storage section. Enemy rarely visit it. ^Sometimes from enemies dropped useful of not useful weapons. ^Force field (belt) is recommended, they reduce damage and heals you if you get serious wounds automatically. ^(when you have a medkits) ^Remember when death you permanent lost all inventory except weapon and suit.
Barricades useful for blocking location from enemy. ^Repaid droids can be useful for repair it or broken doors (not hardly damaged). It always following you. ^Traps and health stations works only with solar panels. If you install more panels they can be more efficient.^When you delivery at least 4 radioactive fuel and save at least 4 scientists you can undock by use special magenta teleport.
0!POMOCR6_2!Бонусы и способности.!Пулемёт - Синий - Первый выстрел прицельный , и если вы попали под прицельный огонь, в это же место будет выпущена^ ^одна или несколько очередей из пулемёта.  Даже если вы сами сидите в танке не советую принимать огонь на себя.^ Усилитель - Красный - Увеличивает скорость и мощность каждого выстрела и перемещения танка. ^От попадания убывает жизнь от полученных повреждений, и если двигатся она будет убывать ещё в 3 раза быстрее. Обычная аптечка может помочь пережить это.^ Пулемёт+Усилитель -  - Добавляет рикошет в виде вредных облаков в разные стороны с дополнительным уроном.^ Замедление - Малиновый - Замедляет скорость.^ Страх - Зелёный - Противник не будет с вами сражатся и постарается уехать в другую сторону.^ Заморозка - Голубой - Танк заморожен и не может перемещатся или стрелять.  Белый танк способность стрелять не теряет.^ Защита - Жёлтый - Вред по этому танку наносится в два раза ниже. Ловушки не срабатывают на защищённый танк.^ Аура защиты - Светло-зеленый - Любой соседний танк получает защиту. ^Отражение боли(Рикошет) - Оранжевый - Отражает любой выстрел в танк в вас.Вы получите ровно столько вреда сколько нанесли. ^Отражение не является защитой и танк получит обычный вред. ^ Аура отражения - Розовый - Любой соседний танк получает отражение боли. ^ Аура ремонта -  - Любой соседний танк быстро ремонтируется до максимума жизни. Невидимость - Полупрозрачность - Танк хуже виден, но не становится невидимым ^ Длительный вред - Мерцание - Танк получает длительные повреждения, от которых может быть уничтожен. Обычно это бывает от рименения усилителя. ^ Понижение урона - Цветное мерцание - Танк при вашем приближении понижает надолго ваш урон. И чем дольше вы рядом тем дольше будет эффект.^ Контроль - Без цвета -  Позволяет вам управлять врагом. 
