13!WELCOM_LINE2!M2k - игра и конструктор, основные цели игры - уничтожение троллей или танков, нахождение секретов, разгадка головоломок, а также спасение учёных. Управление для ПК: Курсор и цифровой блок для второго игрока. Спасибо всем кто помог в развитии игры, с кодом, идеями и графикой. Официальный сайт :  dj-alex.itch.io/m2k , dj-alex.ru
14!WELCOM_LINE1!Witamy drodzy %username% . Przepraszamy za błędy, są dużo ich. Dla ulepszenia tlumaczenia napisz mi dj--alex@ya.ru.  dj-alex.itch.io/m2k  , dj-alex.ru
15!WELCOM_LINE0!M2k - game and constructor, ingame you can destroy trolls, tanks, found secrets and save scientists. Thanks to all who supports this game. The game is playable and free. Written in Lua. PC shortcuts: Player 1 - keys "Cursor", Player 2 - keys "Numpad". All maps from 2-128 are exported from original ZX Spectrum (the game can read directly from "Hobeta" format). Official page:  dj-alex.itch.io/m2k , dj-alex.ru . English translation is not fully done. 
13!RWELCOM_LINE2!RESKUE - Оригинал создан Mastertronic, воссозданная с нуля версия by dj-alex, основные цели - сражаясь с захватчиками необходимо спасти с базы учёных. Ваши противники тоже могут пользоватся разными бонусами или усилителями. Управление для ПК: Курсор, lshift, lwin/caps, Z. Музыка в главном меню оригинальная S.L.Cork. Спасибо всем кто помог в развитии игры, с кодом, идеями. Официальный сайт :  dj-alex.itch.io/reskue , dj-alex.ru
14!RWELCOM_LINE1!Witamy drodzy %username% . Przepraszamy za błędy, są dużo ich. Dla ulepszenia tlumaczenia napisz mi dj--alex@ya.ru.  dj-alex.itch.io/reskue , dj-alex.ru
15!RWELCOM_LINE0!RESKUE - Originally created in 1986 by Mastertronic, remake by dj-alex. Main goal is save scientistc, destroy tanks. Music in main title original S.L.Cork . written in Lua used Love2d Framework. On PC: Player 1 - keys cursor. Official page: dj-alex.itch.io/reskue , dj-alex.ru . 
