15!WELCOM_LINE0!M2k - game and constructor, ingame you can destroy trolls, tanks, found secrets and save scientists. Thanks to all who supports this game. The game is playable and free. Written in Lua. PC shortcuts: Player 1 - keys "Cursor", Player 2 - keys "Numpad". All maps from 2-128 are exported from original ZX Spectrum (the game can read directly from "Hobeta" format). Official page:  dj-alex.itch.io/m2k , dj-alex.ru . English translation is not fully done. 
15!RWELCOM_LINE0!RESKUE - Originally created in 1986 by Mastertronic, remake by dj-alex. Main goal is save scientistc, destroy tanks. Music in main title original S.L.Cork . written in Lua used Love2d Framework. On PC: Player 1 - keys cursor. Official page: dj-alex.itch.io/reskue , dj-alex.ru . 
